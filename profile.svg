      <line x1="613" y1="418" x2="712" y2="418" stroke="#2a3140" stroke-dasharray="2,4"/>
      <text x="720" y="422">jainitisha192@gmail.com</text>

      <text x="524" y="444" fill="#3d4657">·</text>
