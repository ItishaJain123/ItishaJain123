<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" font-family="'JetBrains Mono','Cascadia Code','DejaVu Sans Mono',Consolas,monospace" xml:space="preserve">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7aa2f7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="leftpane"><rect x="20" y="64" width="470" height="546" rx="10"/></clipPath>
    <clipPath id="reveal">
      <rect x="498" y="58" width="672" height="0">
        <animate attributeName="height" from="0" to="556" begin="0.3s" dur="2.1s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <!-- window -->
  <rect x="2" y="2" width="1176" height="636" rx="16" fill="#0b0f17"/>
  <rect x="2.5" y="2.5" width="1175" height="635" rx="15.5" fill="none" stroke="url(#frame)" stroke-width="1.5" opacity="0.9"/>

  <!-- title bar -->
  <circle cx="28" cy="28" r="6.5" fill="#ff5f56"/>
  <circle cx="50" cy="28" r="6.5" fill="#ffbd2e"/>
  <circle cx="72" cy="28" r="6.5" fill="#27c93f"/>
  <text x="590" y="33" text-anchor="middle" font-size="14" fill="#8b949e">itisha@devos ~ % ./profile.sh --live</text>
  <circle cx="1086" cy="28" r="5" fill="#ff5f56">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text x="1100" y="32" font-size="12" letter-spacing="1.5" fill="#ff5f56">SCANNING</text>
  <line x1="14" y1="50" x2="1166" y2="50" stroke="#1c2430" stroke-width="1"/>

