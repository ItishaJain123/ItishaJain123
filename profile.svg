    <line x1="618" y1="518" x2="1140" y2="518" stroke="#2a3140" stroke-dasharray="2,4"/>
    <text x="524" y="548" font-size="14" fill="#8b949e">See live GitHub stats &amp; streak below in README ↓</text>
