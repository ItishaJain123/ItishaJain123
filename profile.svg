  <rect x="20" y="64" width="470" height="546" rx="10" fill="#0a0d14" stroke="#164e63" stroke-opacity="0.7"/>
  <rect x="34" y="58" width="94" height="14" fill="#0b0f17"/>
  <text x="40" y="69" font-size="11" letter-spacing="2" fill="#56b6f2">VISUAL.MAP</text>

