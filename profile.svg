      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="1.6s" fill="freeze"/>
      <tspan x="88" dy="0">                    "=*c*&lt;=-^</tspan>
      <tspan x="88" dy="15.6">                  :*W@W@@@@@Wa_.</tspan>
      <tspan x="88" dy="15.6">                 =Wa=~;;-+&gt;aW@@&lt;</tspan>
      <tspan x="88" dy="15.6">                "@c:"^^^^^":_*%@~</tspan>
      <tspan x="88" dy="15.6">               .c#_--;:":;___-+zX.</tspan>
      <tspan x="88" dy="15.6">               **-cX#o~;c#%a&lt;:=#"</tspan>
      <tspan x="88" dy="15.6">               .-=:_&gt;&gt;=:^^+&lt;_:^=o-</tspan>
      <tspan x="88" dy="15.6">               ._="^":^`'``::"""+&gt;&gt;^</tspan>
      <tspan x="88" dy="15.6">              ..&gt;#&gt;-*&gt;-+++_cc_+#Wa:.</tspan>
      <tspan x="88" dy="15.6">             ..^o@@o&gt;++&lt;&gt;&lt;++&lt;&lt;%@@%:.</tspan>
      <tspan x="88" dy="15.6">            ...+##@@#&gt;~-+_~_&lt;a@@@W*^'.</tspan>
      <tspan x="88" dy="15.6">           . :c%WWW@@#a*cc&gt;&gt;cW@@@@W=''</tspan>
      <tspan x="88" dy="15.6">            ;#XWW@@@@zzocc*o#@W@WWWa+;..</tspan>
      <tspan x="88" dy="15.6">        .^:+zWWWW@@@@o*cccoX%W@WWWW#%#zc&gt;+~^.</tspan>
      <tspan x="88" dy="15.6">      '&gt;az#@W@@##@@@@&lt;";+==++#@@@@#####%%XXX&lt;</tspan>
      <tspan x="88" dy="15.6">    . +WXX%W@@@WWW@W@c.``^`"*@#W@@#W#%%XXXX%X" .</tspan>
      <tspan x="88" dy="15.6">   . 'a%XX%#W@@@@W@W#W_^``;*@@WWW@@@#%%%%X%%#+ .</tspan>
      <tspan x="88" dy="15.6">   . ;W#%X%##W@@@@WWW@a:"^~cW@@@@W@@@#%%%%#%W* .</tspan>
      <tspan x="88" dy="15.6">  .. &gt;#WW%#WWW#@@@@W@@@&lt;"`:%@@@@@#WWW@#%%###Wc .</tspan>
      <tspan x="88" dy="15.6">... 'z%#WW@@@W##WW@@@@@X""&lt;@@W@@@%#@@WW##@WWWo..</tspan>
      <tspan x="88" dy="15.6">... ;%%#W@@@W@@@@@@@@@@Woa#@@@WWWWW@WWW@@@W##a'.</tspan>
      <tspan x="88" dy="15.6">... =W##W@@@@@@@@@@@@@@@#oW@@@W@W@@WW@@@@@#%#X`.</tspan>
    </text>
    <text x="255" y="588" text-anchor="middle" font-size="11" letter-spacing="1" fill="#3d4657">— rendered from a real photo —</text>
  </g>

